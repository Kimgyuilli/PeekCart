spring:
  application:
    name: payment-service
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    # 서비스 런타임은 마이그레이션을 실행하지 않는다. 공유 V1~V13 은 order-service(전환기 migrator, B5) 또는 Testcontainers fixture 가 적용.
    enabled: false
    locations: classpath:db/migration
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: payment-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx}
    access-token-expiry: 1800000    # 30분 (ms) — 검증 전용이나 단일 계약(JwtAuthProperties) 바인딩
    refresh-token-expiry: 604800000 # 7일 (ms)
  outbox:
    # 공유 DB 전환기 poller 소유권 분리 (Payment peel): payment 는 PAYMENT 이벤트만 발행.
    lock-name: paymentOutboxPollingJob
    polling:
      batch-size: 100
      max-retry: 5
      publish-timeout: 6s
      cycle-timeout: 4m
      aggregate-types: PAYMENT

# Slack: payment 는 DLQ·결제 알림에 SlackPort 를 생성자 주입하나 발송은 비핵심.
# webhook 미설정 + no-op fallback 으로 부팅 보장 (PR3b GP-2 loop3 — presence-based
# @ConditionalOnProperty(slack.webhook.url) 가 placeholder 기본값에 항상 매치되던 문제 제거).
slack:
  noop-fallback:
    enabled: true

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_sk_placeholder}
    webhook-secret: ${TOSS_WEBHOOK_SECRET:test_webhook_secret_placeholder}
