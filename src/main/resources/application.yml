spring:
  application:
    name: peekcart
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: peekcart

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx}
    access-token-expiry: 1800000    # 30분 (ms)
    refresh-token-expiry: 604800000 # 7일 (ms)
  outbox:
    # 공유 DB 전환기 poller 소유권 분리 (Order peel PR-a): order 가 order-service 로 peel 되어 자가발행 →
    # root 잔여 app 은 PAYMENT 이벤트만 발행한다(ORDER 는 order-service 의 orderOutboxPollingJob 이 소유).
    lock-name: rootOutboxPollingJob
    polling:
      batch-size: 100
      max-retry: 5
      publish-timeout: 6s
      cycle-timeout: 4m
      aggregate-types: PAYMENT

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/placeholder}

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_sk_placeholder}
    webhook-secret: ${TOSS_WEBHOOK_SECRET:test_webhook_secret_placeholder}
