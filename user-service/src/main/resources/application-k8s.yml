spring:
  datasource:
    url: jdbc:mysql://mysql:3306/peekcart_user?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:peekcart_user}
    password: ${DB_PASSWORD:peekcart_user}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    com.peekcart: INFO
