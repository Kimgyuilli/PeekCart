# kube-prometheus-stack Helm values — GKE 환경 (ADR-0004, ADR-0006 불변식 6)
#
# 대상: GKE Standard asia-northeast3-a / e2-standard-4 (4 vCPU / 16Gi) × 1
# 목적: Phase 3 Task 3-4 부하 테스트 기간의 메트릭 수집 · 사후 분석
#
# 설계 수치 근거:
# - retention 24h: 부하 테스트 1일 범위 사후 분석. 더 필요하면 상향
# - prometheus PVC 5Gi (standard-rwo): 24h × ~1만 시계열 여유
# - prometheus limits 1500m/2Gi: 노드 allocatable 의 ~12%
# - grafana: Internal LB. persistence 미사용 (대시보드는 sidecar ConfigMap, 측정 후 클러스터 폐기 전제)
# - alertmanager 미사용: Grafana unified alerting 으로 alert 규칙 평가·UI 시각화 (minikube 와 동일).
#   외부 채널(Slack/PagerDuty) 발송용 contact point/notification policy 는 미provisioning —
#   운영 알림 채널 설계는 L-004(Phase 4)로 이관. 상세는 shared/grafana-alerts.yml 헤더 참고.

prometheus:
  prometheusSpec:
    # k6 experimental-prometheus-rw 수신 전용 (ADR-0006 보완).
    # 본 클러스터는 부하 테스트 기간에만 존재하며 외부 노출 없음.
    enableRemoteWriteReceiver: true
    retention: 24h
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 2Gi
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  adminPassword: admin
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    alerts:
      enabled: true
      searchNamespace: ALL
    # D-008: datasource UID 명시 고정. 차트 기본값과 동일하나 명시 선언으로
    # 업그레이드 시 기본값 변경에 따른 dashboard/alert (`uid: prometheus`) 회귀 차단.
    datasources:
      uid: prometheus
  service:
    type: LoadBalancer
    annotations:
      networking.gke.io/load-balancer-type: "Internal"
  grafana.ini:
    unified_alerting:
      enabled: true

alertmanager:
  enabled: false

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 256Mi
