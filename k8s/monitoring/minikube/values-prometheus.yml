# kube-prometheus-stack Helm values — minikube 경량 설정
# minikube 8GB 환경: 모니터링 총 ~1.2GB 이내

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    storageSpec: {}

grafana:
  adminPassword: admin
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    alerts:
      enabled: true
      searchNamespace: ALL
    # D-008: datasource UID 명시 고정. 차트 기본값과 동일하나 명시 선언으로
    # 업그레이드 시 기본값 변경에 따른 dashboard/alert (`uid: prometheus`) 회귀 차단.
    datasources:
      uid: prometheus
  service:
    type: NodePort
    nodePort: 30030
  grafana.ini:
    unified_alerting:
      enabled: true

alertmanager:
  enabled: false

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
