# Grafana unified alerting — alert 규칙 provisioning (ConfigMap, Grafana sidecar 자동 로드).
# 범위: 규칙 평가 + Grafana UI 시각화/알림 상태 표시까지.
# contact point/notification policy 는 의도적으로 미provisioning —
#   "alert 발화 → 외부 채널(Slack/PagerDuty) 발송" 경로는 본 파일 비대상이며,
#   운영 알림 채널 설계는 L-004(Phase 4)로 이관(부하테스트용 임시 클러스터엔 불필요).
# 주의: 앱 비즈니스/운영 Slack(Notification 도메인 · Outbox FAILED 통지)은 앱이
#   SlackNotificationClient 로 직접 발송하는 별개 경로이며 본 alert 경로와 무관.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  alerts.yaml: |-
    apiVersion: 1
    groups:
      - orgId: 1
        name: PeekCart Alerts
        folder: PeekCart
        interval: 1m
        rules:
          - uid: peekcart-high-error-rate
            title: "High Error Rate (5xx > 5%)"
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "sum by (application)(rate(http_server_requests_seconds_count{application=~\"notification-service|order-service|payment-service|product-service|user-service\", status=~\"5..\"}[5m]))"
                  instant: false
                  range: true
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "sum by (application)(rate(http_server_requests_seconds_count{application=~\"notification-service|order-service|payment-service|product-service|user-service\"}[5m]))"
                  instant: false
                  range: true
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "($B > 0) && (($A / $B) * 100 > 5)"
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PeekCart 5xx 에러율 5% 초과 — {{ $labels.application }}"
              description: "{{ $labels.application }} 의 최근 5분간 5xx 에러율이 5%를 초과했습니다."
          - uid: peekcart-slow-response
            title: "Slow API Response (p95 > 2s)"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=~\"notification-service|order-service|payment-service|product-service|user-service\", uri!~\"/actuator.*\"}[5m])) by (le, application))"
                  instant: false
                  range: true
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [2]
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "PeekCart API p95 응답시간 2초 초과 — {{ $labels.application }}"
              description: "{{ $labels.application }} 의 최근 5분간 API p95 응답시간이 2초를 초과했습니다."
          - uid: peekcart-target-down
            title: "Peekcart Target Down (up == 0)"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "count by (service)(up{namespace=\"peekcart\"} == 0) or on() vector(0)"
                  instant: true
                  range: false
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PeekCart 타겟 스크랩 실패 (up == 0) — {{ $labels.service }}"
              description: "{{ $labels.service }} 의 타겟을 Prometheus 가 스크랩 시도했으나 실패 (네트워크, 인증, /actuator/prometheus 500 등). up 시계열은 존재하되 0. Error Rate 패널의 강제 0% 표시와 구분하는 신호."
          - uid: peekcart-scrape-absent-notification-service
            title: "Peekcart Metrics Scrape Absent — notification-service"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "absent(up{namespace=\"peekcart\", service=\"notification-service\"}) or on() vector(0)"
                  instant: true
                  range: false
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
              service: notification-service
            annotations:
              summary: "PeekCart up 시계열 부재 — notification-service (ServiceMonitor 미매칭 / 서비스 삭제)"
              description: "notification-service 의 up 메트릭 series 부재. ServiceMonitor selector 미스매치, 서비스 삭제, Prometheus 설정 문제 등 구조적 부재. 스크랩 실패(up == 0) 는 peekcart-target-down 에서 감지." 
          - uid: peekcart-scrape-absent-order-service
            title: "Peekcart Metrics Scrape Absent — order-service"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "absent(up{namespace=\"peekcart\", service=\"order-service\"}) or on() vector(0)"
                  instant: true
                  range: false
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
              service: order-service
            annotations:
              summary: "PeekCart up 시계열 부재 — order-service (ServiceMonitor 미매칭 / 서비스 삭제)"
              description: "order-service 의 up 메트릭 series 부재. ServiceMonitor selector 미스매치, 서비스 삭제, Prometheus 설정 문제 등 구조적 부재. 스크랩 실패(up == 0) 는 peekcart-target-down 에서 감지." 
          - uid: peekcart-scrape-absent-payment-service
            title: "Peekcart Metrics Scrape Absent — payment-service"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "absent(up{namespace=\"peekcart\", service=\"payment-service\"}) or on() vector(0)"
                  instant: true
                  range: false
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
              service: payment-service
            annotations:
              summary: "PeekCart up 시계열 부재 — payment-service (ServiceMonitor 미매칭 / 서비스 삭제)"
              description: "payment-service 의 up 메트릭 series 부재. ServiceMonitor selector 미스매치, 서비스 삭제, Prometheus 설정 문제 등 구조적 부재. 스크랩 실패(up == 0) 는 peekcart-target-down 에서 감지." 
          - uid: peekcart-scrape-absent-product-service
            title: "Peekcart Metrics Scrape Absent — product-service"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "absent(up{namespace=\"peekcart\", service=\"product-service\"}) or on() vector(0)"
                  instant: true
                  range: false
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
              service: product-service
            annotations:
              summary: "PeekCart up 시계열 부재 — product-service (ServiceMonitor 미매칭 / 서비스 삭제)"
              description: "product-service 의 up 메트릭 series 부재. ServiceMonitor selector 미스매치, 서비스 삭제, Prometheus 설정 문제 등 구조적 부재. 스크랩 실패(up == 0) 는 peekcart-target-down 에서 감지." 
          - uid: peekcart-scrape-absent-user-service
            title: "Peekcart Metrics Scrape Absent — user-service"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "absent(up{namespace=\"peekcart\", service=\"user-service\"}) or on() vector(0)"
                  instant: true
                  range: false
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: math
                  expression: "$A > 0"
            for: 2m
            labels:
              severity: critical
              service: user-service
            annotations:
              summary: "PeekCart up 시계열 부재 — user-service (ServiceMonitor 미매칭 / 서비스 삭제)"
              description: "user-service 의 up 메트릭 series 부재. ServiceMonitor selector 미스매치, 서비스 삭제, Prometheus 설정 문제 등 구조적 부재. 스크랩 실패(up == 0) 는 peekcart-target-down 에서 감지." 
