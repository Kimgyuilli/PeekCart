# GKE: e2-standard-4 (4 vCPU / 16Gi) 기준 resources 상향
# - HPA max=3 기준 requests 합계: 3 × (500m / 1Gi) = 1.5 vCPU / 3Gi → 노드 allocatable 여유 확보
# - limits 는 vCPU 오버커밋 허용 (K8s 정책). memory limit 은 pod OOMKill 방어선
# - imagePullPolicy 는 base image tag(:latest) 기준 Kubernetes 기본값(Always) 사용. Artifact Registry pull 허용
# - strategic merge: container 는 name(`peekcart`) 으로 매칭되므로 base 에 sidecar 가 추가되어도
#   잘못된 컨테이너에 resources 가 붙지 않음 (과거 JSON6902 `containers/0` 인덱스 방식 대비 개선)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peekcart
  namespace: peekcart
spec:
  template:
    spec:
      containers:
        - name: peekcart
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
