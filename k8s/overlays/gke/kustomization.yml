apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GKE overlay — Phase 3 Task 3-4 부하 테스트 / Phase 4 운영 환경 (ADR-0004, ADR-0005, ADR-0006)
#
# 본 overlay 는 base 에 다음 환경 차이를 적용합니다:
#   - peekcart Service: ClusterIP → LoadBalancer (Internal, GKE annotation)
#   - peekcart Deployment: resources requests/limits 상향 (e2-standard-4 기준)
#   - infra PVC (mysql/redis/kafka): storageClassName = standard-rwo 명시
#   - 이미지: GHCR → Artifact Registry 경로 (PROJECT_ID_PLACEHOLDER 치환 필요)
#
# PROJECT_ID 치환 방법 (README 참고):
#   cd k8s/overlays/gke
#   kustomize edit set image \
#     ghcr.io/kimgyuilli/peekcart=asia-northeast3-docker.pkg.dev/<YOUR_PROJECT>/peekcart/peekcart:latest
#   (편집 결과는 커밋하지 않는다 — operator 로컬 상태)
#
# monitoring 스택은 본 overlay 에 포함되지 않습니다 (ADR-0006 불변식 1).
# k8s/monitoring/gke/ 에서 별도 설치. 배포 순서는 docs/02-architecture.md §12.

resources:
  - ../../base
  - hpa.yml

patches:
  # Deployment / Service 는 strategic merge (gvk + metadata.name 자동 매칭, target 불필요). 5서비스 × 2.
  - path: patches/notification-service-deployment.yml
  - path: patches/notification-service-service.yml
  - path: patches/user-service-deployment.yml
  - path: patches/user-service-service.yml
  - path: patches/product-service-deployment.yml
  - path: patches/product-service-service.yml
  - path: patches/order-service-deployment.yml
  - path: patches/order-service-service.yml
  - path: patches/payment-service-deployment.yml
  - path: patches/payment-service-service.yml
  # PVC 는 JSON6902 — base 의 mysql/redis/kafka PVC 3 건에 동일 storageClassName 일괄 적용
  - path: patches/pvc-storageclass.yml
    target:
      kind: PersistentVolumeClaim

# GHCR → Artifact Registry 경로 재작성 (D-016 image promotion). 5서비스 per-image.
# PROJECT_ID 치환은 README 참고 (scripts/promote-images.sh 가 승격·digest 산출).
images:
  - name: ghcr.io/kimgyuilli/peekcart-notification-service
    newName: asia-northeast3-docker.pkg.dev/PROJECT_ID_PLACEHOLDER/peekcart/notification-service
    newTag: latest
  - name: ghcr.io/kimgyuilli/peekcart-user-service
    newName: asia-northeast3-docker.pkg.dev/PROJECT_ID_PLACEHOLDER/peekcart/user-service
    newTag: latest
  - name: ghcr.io/kimgyuilli/peekcart-product-service
    newName: asia-northeast3-docker.pkg.dev/PROJECT_ID_PLACEHOLDER/peekcart/product-service
    newTag: latest
  - name: ghcr.io/kimgyuilli/peekcart-order-service
    newName: asia-northeast3-docker.pkg.dev/PROJECT_ID_PLACEHOLDER/peekcart/order-service
    newTag: latest
  - name: ghcr.io/kimgyuilli/peekcart-payment-service
    newName: asia-northeast3-docker.pkg.dev/PROJECT_ID_PLACEHOLDER/peekcart/payment-service
    newTag: latest
