apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# minikube overlay — 로컬 개발/검증 환경 (ADR-0004 §Context, ADR-0005, ADR-0006)
# - 이미지: 로컬 빌드 사용 (imagePullPolicy: Never)
# - 외부 노출: NodePort 30080
# - monitoring 스택은 본 overlay 에 포함되지 않습니다 (ADR-0006).
#   k8s/monitoring/minikube/ 에서 별도 설치. 배포 순서는 docs/02-architecture.md §12.

resources:
  - ../../base

# strategic merge patch — gvk + metadata.name 자동 매칭(target 불필요). 5서비스 × {deployment,service}.
patches:
  - path: patches/notification-service-deployment.yml
  - path: patches/notification-service-service.yml
  - path: patches/user-service-deployment.yml
  - path: patches/user-service-service.yml
  - path: patches/product-service-deployment.yml
  - path: patches/product-service-service.yml
  - path: patches/order-service-deployment.yml
  - path: patches/order-service-service.yml
  - path: patches/payment-service-deployment.yml
  - path: patches/payment-service-service.yml
