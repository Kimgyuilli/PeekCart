apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: peekcart
type: Opaque
# MySQL 서버 자격증명 (DB 인프라 전용). 단일 peekcart 분해(PR3b)로 per-service app Secret 과
# 분리한다 — 앱은 자기 <svc>-secret 의 DB_USERNAME/DB_PASSWORD 로 접속, MySQL 서버는 본 Secret 으로
# 부팅한다(값 동일·공유 DB 전환기). ② DB 물리분리 시 서비스별 DB 자격증명으로 분화.
# 평문 템플릿 — KMS/Vault 외부화는 ③ (L-002).
stringData:
  DB_USERNAME: peekcart
  DB_PASSWORD: peekcart
