apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: peekcart
type: Opaque
# MySQL 서버 자격증명 (DB 인프라 전용, root). DB-per-service(구현 ② PR2)로 5 계정 비밀번호를
# 함께 보유 — init ConfigMap(mysql-init-config) 의 .sh 가 env 로 읽어 5 계정을 생성한다(ConfigMap 에
# 비밀번호 literal 금지). 앱은 자기 <svc>-secret 의 DB_USERNAME/DB_PASSWORD(=peekcart_<svc>)로 접속.
# 평문 템플릿 — KMS/Vault 외부화는 ③ (L-002).
stringData:
  DB_PASSWORD: peekcart                       # MYSQL_ROOT_PASSWORD (root)
  USER_DB_PASSWORD: peekcart_user
  PRODUCT_DB_PASSWORD: peekcart_product
  ORDER_DB_PASSWORD: peekcart_order
  PAYMENT_DB_PASSWORD: peekcart_payment
  NOTIFICATION_DB_PASSWORD: peekcart_notification
