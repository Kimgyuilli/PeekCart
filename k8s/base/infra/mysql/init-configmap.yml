apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
  namespace: peekcart
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: peekcart
# DB-per-service (구현 ② PR2): 5 스키마 + 5 계정 + 격리 GRANT 를 첫 부팅 시 생성한다.
# ⚠️ 비밀번호는 ConfigMap 에 literal 로 두지 않는다(평문 노출 금지) — env(Secret mysql-secret 의
# *_DB_PASSWORD)로 주입하고, 본 스크립트는 shell 변수 참조만 한다. mysql 엔트리포인트가
# /docker-entrypoint-initdb.d/*.sh 를 root 비밀번호 설정 후 실행한다(env 가용).
data:
  10-init-databases.sh: |
    #!/bin/bash
    set -euo pipefail

    # 각 서비스: 자기 스키마 + 자기 계정 + 자기 스키마에만 GRANT(타 스키마 권한 없음 = 격리).
    create_service_db() {
      local schema="$1"
      local password="$2"
      mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" <<SQL
    CREATE DATABASE IF NOT EXISTS \`${schema}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci;
    CREATE USER IF NOT EXISTS '${schema}'@'%' IDENTIFIED BY '${password}';
    GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, ALTER, INDEX, REFERENCES ON \`${schema}\`.* TO '${schema}'@'%';
    SQL
    }

    create_service_db "peekcart_user"         "${USER_DB_PASSWORD}"
    create_service_db "peekcart_product"      "${PRODUCT_DB_PASSWORD}"
    create_service_db "peekcart_order"        "${ORDER_DB_PASSWORD}"
    create_service_db "peekcart_payment"      "${PAYMENT_DB_PASSWORD}"
    create_service_db "peekcart_notification" "${NOTIFICATION_DB_PASSWORD}"

    mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "FLUSH PRIVILEGES;"
