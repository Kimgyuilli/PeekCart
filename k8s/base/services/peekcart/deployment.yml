apiVersion: apps/v1
kind: Deployment
metadata:
  name: peekcart
  namespace: peekcart
  labels:
    app.kubernetes.io/name: peekcart
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: peekcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peekcart
  template:
    metadata:
      labels:
        app: peekcart
        app.kubernetes.io/name: peekcart
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: peekcart
    spec:
      containers:
        - name: peekcart
          image: ghcr.io/kimgyuilli/peekcart:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: peekcart-config
            - secretRef:
                name: peekcart-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: peekcart
  namespace: peekcart
  labels:
    app: peekcart
spec:
  type: ClusterIP
  selector:
    app: peekcart
  ports:
    - name: http
      port: 8080
      targetPort: 8080
