apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: peekcart
type: Opaque
# 평문 매니페스트(전환기 템플릿) — KMS/Vault 외부화는 ③ Gateway 보안 묶음(L-002). 실배포 시 값 교체.
stringData:
  DB_USERNAME: peekcart_notification
  DB_PASSWORD: peekcart_notification
  JWT_SECRET: peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx
  # ⚠️ SLACK_WEBHOOK_URL 은 committed manifest 에 두지 않는다(GP-2 work #2) — placeholder 를 박으면
  # application-k8s.yml 의 ${SLACK_WEBHOOK_URL}(no-default) fail-fast 가 무력화된다. operator 가
  # external/sealed Secret 으로 실 값을 주입해야 notification 이 부팅한다(누락 시 fail-fast = 의도).
  # 예: kubectl create secret generic notification-service-secret --from-literal=SLACK_WEBHOOK_URL=... (또는 sealed-secrets)
