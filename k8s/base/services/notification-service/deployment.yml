apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: peekcart
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: peekcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: peekcart
    spec:
      # DB-per-service (구현 ② PR2): 각 서비스가 자기 스키마를 독립 Flyway 마이그레이션하므로
      # order-service readiness 게이트(전환기 initContainer)를 제거한다 — cross-service cold-start 순서 의존 소멸.
      containers:
        - name: notification-service
          image: ghcr.io/kimgyuilli/peekcart-notification-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: peekcart
  labels:
    app: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
