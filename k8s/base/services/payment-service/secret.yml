apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
  namespace: peekcart
type: Opaque
# 평문 매니페스트(전환기 템플릿) — KMS/Vault 외부화는 ③ Gateway 보안 묶음(L-002). 실배포 시 값 교체.
stringData:
  DB_USERNAME: peekcart
  DB_PASSWORD: peekcart
  JWT_SECRET: peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx
  # ⚠️ TOSS_SECRET_KEY / TOSS_WEBHOOK_SECRET 는 committed manifest 에 두지 않는다(GP-2 work #3) —
  # test placeholder 를 박으면 application-k8s.yml 의 ${TOSS_*}(no-default) fail-fast 가 무력화되고
  # stub 자격증명이 운영 렌더에 새어든다. operator 가 external/sealed Secret 으로 실 값을 주입한다.
  # 예: kubectl create secret generic payment-service-secret --from-literal=TOSS_SECRET_KEY=... --from-literal=TOSS_WEBHOOK_SECRET=...
