apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: product-service
  namespace: peekcart
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: peekcart
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: product-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
  namespaceSelector:
    matchNames:
      - peekcart
