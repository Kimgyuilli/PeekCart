apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: peekcart
type: Opaque
# 평문 매니페스트(전환기 템플릿) — KMS/Vault 외부화는 ③ Gateway 보안 묶음(L-002). 실배포 시 값 교체.
stringData:
  DB_USERNAME: peekcart
  DB_PASSWORD: peekcart
  JWT_SECRET: peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx
