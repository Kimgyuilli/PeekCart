apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# PeekCart base — 환경 비종속 매니페스트 (ADR-0005, ADR-0006)
# 환경별 차이는 k8s/overlays/{minikube,gke}/ 에서 patch.
#
# 모든 리소스는 peekcart 네임스페이스에 속합니다 (ADR-0006 불변식 1).
# Monitoring 스택(Helm values, Grafana 대시보드/Alert) 은 base 가 아니라
# k8s/monitoring/ 트리에서 별도 관리됩니다. 배포 순서는 docs/02-architecture.md §12.
#
# kustomize `namespace:` 필드는 사용하지 않습니다 — 모든 리소스를 한 NS 로 강제하기 때문.

resources:
  - namespace.yml
  - infra/mysql/secret.yml
  - infra/mysql/init-configmap.yml
  - infra/mysql/mysql.yml
  - infra/redis/redis.yml
  - infra/kafka/kafka.yml
  # 5개 서비스 per-service 매니페스트. DB-per-service(구현 ② PR2)로 각 서비스가 자기 스키마를
  # 독립 Flyway 마이그레이션 → 전환기 order-service readiness initContainer 게이트 제거.
  - services/notification-service/deployment.yml
  - services/notification-service/configmap.yml
  - services/notification-service/secret.yml
  - services/notification-service/servicemonitor.yml
  - services/user-service/deployment.yml
  - services/user-service/configmap.yml
  - services/user-service/secret.yml
  - services/user-service/servicemonitor.yml
  - services/product-service/deployment.yml
  - services/product-service/configmap.yml
  - services/product-service/secret.yml
  - services/product-service/servicemonitor.yml
  - services/order-service/deployment.yml
  - services/order-service/configmap.yml
  - services/order-service/secret.yml
  - services/order-service/servicemonitor.yml
  - services/payment-service/deployment.yml
  - services/payment-service/configmap.yml
  - services/payment-service/secret.yml
  - services/payment-service/servicemonitor.yml
