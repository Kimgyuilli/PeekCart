name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Install lint dependencies
        run: |
          python3 -m pip install --user pyyaml

      - name: Set up kubectl (for ServiceMonitor lint)
        uses: azure/setup-kubectl@v4

      - name: Run CI policy lints
        # PR3b: per-service k8s 매니페스트(5) 완성으로 IMAGE_CONTRACT_TRANSITION(SUSPENDED) 제거.
        # image-contract-lint 가 ci↔base↔gke 3-way 를 full 5/5 로 강제한다.
        run: |
          bash scripts/kustomize-namespace-lint.sh
          bash scripts/image-contract-lint.sh
          bash scripts/servicemonitor-selector-lint.sh
          # [Payment peel PR-b] observability-ssot/promql lint 는 root `src/main/resources/application.yml`
          # (단일 모놀리스 base yml)을 SSOT 로 가정한다. root app 해체로 그 파일이 사라졌고, 관측성 SSOT 는
          # 이제 서비스별(application=<service>)로 분산된다. 모놀리스 전제 lint 와 alert ground-truth(application=peekcart)
          # 의 per-service 재설계는 PR3(관측성/CI 재구성)에서 수행한다 — 그때까지 두 lint 는 비활성.
          # bash scripts/observability-ssot-lint.sh
          # bash scripts/observability-promql-lint.sh

      - run: ./gradlew build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/

  # [PR3a] 서비스별 이미지 — 단일 Dockerfile + ARG SERVICE 매트릭스.
  # build/smoke(PR+push, contents:read 만) 와 publish(main push 한정, packages:write) 를 **분리**한다.
  # 권한은 job 단위라, PR 의 build/smoke 가 write 토큰 범위에서 돌지 않게 하려면 job 을 나눠야 한다.
  # 중복 빌드 회피: build/smoke 가 smoke 통과한 *바로 그 이미지* 를 docker save → artifact 로 넘기고,
  # publish 가 load 후 push 한다(재빌드/divergence 없음).
  images:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - notification-service
          - user-service
          - product-service
          - order-service
          - payment-service

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --build-arg SERVICE=${{ matrix.service }} -t ${{ matrix.service }}:ci .

      - name: Health smoke
        run: bash scripts/docker-health-smoke.sh ${{ matrix.service }}:ci

      - name: Save image for publish (main push only)
        if: github.event_name == 'push'
        run: docker save ${{ matrix.service }}:ci | gzip > image.tar.gz

      - name: Upload image artifact (main push only)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: image.tar.gz
          retention-days: 1

  # GHCR publish — main push 한정. smoke 를 통과한 이미지를 load 후 push 한다.
  # packages:write 는 이 job 에만 부여되어 PR build/smoke 경로엔 write 토큰이 닿지 않는다.
  publish:
    needs: images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - notification-service
          - user-service
          - product-service
          - order-service
          - payment-service

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}

      - name: Load image
        run: docker load < <(gunzip -c image.tar.gz)

      - name: Resolve image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/peekcart-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        # L-016a/D-016: push 후 registry digest 를 산출하고, 비어 있으면 실패시킨다(digest 누락 green 차단).
        run: |
          IMG="${{ steps.img.outputs.name }}"
          docker tag ${{ matrix.service }}:ci "$IMG:${{ github.sha }}"
          docker tag ${{ matrix.service }}:ci "$IMG:latest"
          push_out="$(docker push "$IMG:${{ github.sha }}")"
          echo "$push_out"
          docker push "$IMG:latest"
          DIGEST="$(printf '%s\n' "$push_out" | grep -oE 'sha256:[0-9a-f]{64}' | head -1)"
          if [[ -z "$DIGEST" ]]; then
            echo "::error::[L-016a] ${IMG} push digest 산출 실패 — D-016 image promotion 계약 위반" >&2
            exit 1
          fi
          echo "pushed: ${IMG}@${DIGEST} (tags: ${{ github.sha }}, latest)"
          echo "pushed digest: $(docker inspect --format='{{index .RepoDigests 0}}' "$IMG:latest" 2>/dev/null || echo n/a)"
