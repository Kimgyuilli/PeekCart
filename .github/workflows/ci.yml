name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/peekcart

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Install lint dependencies
        run: |
          python3 -m pip install --user pyyaml

      - name: Set up kubectl (for ServiceMonitor lint)
        uses: azure/setup-kubectl@v4

      - name: Run CI policy lints
        run: |
          bash scripts/kustomize-namespace-lint.sh
          bash scripts/image-contract-lint.sh
          bash scripts/servicemonitor-selector-lint.sh
          # [Payment peel PR-b] observability-ssot/promql lint 는 root `src/main/resources/application.yml`
          # (단일 모놀리스 base yml)을 SSOT 로 가정한다. root app 해체로 그 파일이 사라졌고, 관측성 SSOT 는
          # 이제 서비스별(application=<service>)로 분산된다. 모놀리스 전제 lint 와 alert ground-truth(application=peekcart)
          # 의 per-service 재설계는 PR3(관측성/CI 재구성)에서 수행한다 — 그때까지 두 lint 는 비활성.
          # bash scripts/observability-ssot-lint.sh
          # bash scripts/observability-promql-lint.sh

      - run: ./gradlew build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/

      # [Payment peel PR-b] root app 해체로 단일 root 이미지(app.jar)가 소멸했다.
      # 기존 root Dockerfile 기반 PR build/smoke·GHCR push 스텝은 더 이상 빌드할 산출물이 없어 제거한다.
      # 서비스별(order/payment/product/user/notification) 이미지 + CI 매트릭스 재구성은 PR3(Dockerfile/CI/k8s)에서 도입한다.
