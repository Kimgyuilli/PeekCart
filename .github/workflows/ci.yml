name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/peekcart

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Install lint dependencies
        run: |
          python3 -m pip install --user pyyaml

      - name: Set up kubectl (for ServiceMonitor lint)
        uses: azure/setup-kubectl@v4

      - name: Run CI policy lints
        run: |
          bash scripts/kustomize-namespace-lint.sh
          bash scripts/observability-ssot-lint.sh
          bash scripts/servicemonitor-selector-lint.sh
          bash scripts/observability-promql-lint.sh

      - run: ./gradlew build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      - name: Set image name lowercase
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v5
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
