spring:
  application:
    name: product-service
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    # 서비스 런타임은 마이그레이션을 실행하지 않는다. 공유 V1~V9 는 root flywayMigrateShared 또는 Testcontainers fixture 가 적용.
    enabled: false
    locations: classpath:db/migration
  kafka:
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    listener:
      ack-mode: record
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: product-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx}
    access-token-expiry: 1800000    # 30분 (ms) — 검증 전용이나 단일 계약(JwtAuthProperties) 바인딩
    refresh-token-expiry: 604800000 # 7일 (ms)
  outbox:
    # 공유 DB 전환기 poller 소유권 분리 (Product peel): product 는 PRODUCT 이벤트만 발행.
    lock-name: productOutboxPollingJob
    polling:
      batch-size: 100
      max-retry: 5
      publish-timeout: 6s
      cycle-timeout: 4m
      aggregate-types: PRODUCT

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/placeholder}
