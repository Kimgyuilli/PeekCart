spring:
  datasource:
    url: jdbc:mysql://mysql:3306/peekcart_product?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:peekcart_product}
    password: ${DB_PASSWORD:peekcart_product}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    com.peekcart: INFO
