spring:
  datasource:
    url: jdbc:mysql://mysql:3306/peekcart_notification?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:peekcart_notification}
    password: ${DB_PASSWORD:peekcart_notification}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    com.peekcart: INFO

# Slack webhook (자격증명) — k8s 에서는 기본값 없이 강제. 누락 시 placeholder 미해석으로 부팅 실패(fail-fast).
# notification 은 실 발송 주체라 no-op fallback 을 켜지 않는다 (PR3b GP-2 loop2 — silent 알림 유실 방지).
slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL}
