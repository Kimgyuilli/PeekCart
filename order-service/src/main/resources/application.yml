spring:
  application:
    name: order-service
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    # [B5 전환기 migrator] root app 소멸(PR-b)로 공유 스키마 런타임 적용 주체가 사라져, order-service 가 그 역할을 승계한다.
    # 공유 DB(② 물리분리 전)의 V1~V13 을 런타임에 적용한다. 나머지 서비스(payment/product/user/notification)는
    # flyway.enabled=false + ddl-auto=validate 로 유지하므로, cold-start 시 order-service 가 먼저 마이그레이션해야 한다
    # (런타임 순서/readiness 형식화는 PR3 k8s/compose). ② DB 물리분리 시 서비스별 독립 이력으로 정리.
    enabled: true
    locations: classpath:db/migration
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: order-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:peekcart-secret-key-must-be-at-least-256-bits-long-xxxxxxxxxxxxxxx}
    access-token-expiry: 1800000    # 30분 (ms) — 검증 전용이나 단일 계약(JwtAuthProperties) 바인딩
    refresh-token-expiry: 604800000 # 7일 (ms)
  outbox:
    # 공유 DB 전환기 poller 소유권 분리 (Order peel): order 는 ORDER 이벤트만 발행.
    lock-name: orderOutboxPollingJob
    polling:
      batch-size: 100
      max-retry: 5
      publish-timeout: 6s
      cycle-timeout: 4m
      aggregate-types: ORDER

# Slack: order 는 DLQ·업무 알림에 SlackPort 를 생성자 주입하나 발송은 비핵심.
# webhook 미설정 + no-op fallback 으로 부팅 보장 (PR3b GP-2 loop3 — presence-based
# @ConditionalOnProperty(slack.webhook.url) 가 placeholder 기본값에 항상 매치되던 문제 제거).
slack:
  noop-fallback:
    enabled: true
